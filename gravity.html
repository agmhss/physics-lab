<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Drop | ஈர்ப்பு விசை</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .header-bar { background-color: #003366; color: white; padding: 15px 0; }
        .canvas-container {
            background-color: #87CEEB; /* Sky blue background */
            border-radius: 15px;
            padding: 0;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
            height: 500px;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .control-panel { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .vacuum-bg { background-color: #1a1a2e !important; } /* Dark space background for vacuum */
        
        /* Custom Toggle Switch */
        .form-switch .form-check-input { width: 3em; height: 1.5em; cursor: pointer; }
        .emoji-select { font-size: 1.5rem; }
    </style>
</head>
<body>

    <div class="header-bar text-center shadow-sm mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="physicslab.html" class="btn btn-outline-light btn-sm" data-ta="< பின்செல்ல" data-en="< Back"> < பின்செல்ல </a>
            <h3 class="m-0" data-ta="ஈர்ப்பு விசை (Gravity)" data-en="Gravity Drop Simulator">ஈர்ப்பு விசை (Gravity)</h3>
            <button id="langToggleBtn" class="btn btn-warning btn-sm fw-bold" onclick="toggleLanguage()">English</button>
        </div>
    </div>

    <div class="container">
        <div class="row">
            <div class="col-lg-7">
                <div class="canvas-container shadow" id="dropZone">
                    <canvas id="gravityCanvas" width="600" height="500"></canvas>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="control-panel">
                    <h4 class="mb-3 border-bottom pb-2" data-ta="பொருட்களைத் தேர்ந்தெடுக்கவும்" data-en="Select Objects">பொருட்களைத் தேர்ந்தெடுக்கவும்</h4>
                    
                    <div class="row mb-4">
                        <div class="col-6">
                            <label class="form-label fw-bold" data-ta="பொருள் 1" data-en="Object 1">பொருள் 1</label>
                            <select id="obj1Select" class="form-select emoji-select" onchange="resetDrop()">
                                <option value="apple">🍎 Apple</option>
                                <option value="bowling">🎳 Bowling Ball</option>
                                <option value="leaf">🍃 Leaf</option>
                                <option value="feather">🪶 Feather</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-bold" data-ta="பொருள் 2" data-en="Object 2">பொருள் 2</label>
                            <select id="obj2Select" class="form-select emoji-select" onchange="resetDrop()">
                                <option value="feather" selected>🪶 Feather</option>
                                <option value="leaf">🍃 Leaf</option>
                                <option value="apple">🍎 Apple</option>
                                <option value="bowling">🎳 Bowling Ball</option>
                            </select>
                        </div>
                    </div>

                    <h5 class="mb-3 border-bottom pb-2" data-ta="சூழல் (Environment)" data-en="Environment">சூழல் (Environment)</h5>
                    
                    <div class="form-check form-switch mb-4 d-flex align-items-center">
                        <input class="form-check-input me-3" type="checkbox" id="vacuumToggle" onchange="toggleVacuum()">
                        <label class="form-check-label fs-5 fw-bold" id="envLabel" for="vacuumToggle" data-ta="காற்று உள்ள பகுதி (பூமி)" data-en="Air Resistance (Earth)">காற்று உள்ள பகுதி (பூமி)</label>
                    </div>

                    <div class="alert alert-info small mb-4" id="factBox" data-ta="காற்றில், அதிக எடை கொண்ட பொருட்கள் வேகமாக கீழே விழும்." data-en="In the air, heavier objects with less air resistance fall faster.">
                        காற்றில், அதிக எடை கொண்ட பொருட்கள் வேகமாக கீழே விழும்.
                    </div>

                    <div class="d-grid gap-2">
                        <button class="btn btn-success btn-lg fw-bold" onclick="startDrop()" data-ta="கீழே போடு (DROP!)" data-en="DROP!">கீழே போடு (DROP!)</button>
                        <button class="btn btn-outline-danger" onclick="resetDrop()" data-ta="மீட்டமை (Reset)" data-en="Reset">மீட்டமை (Reset)</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gravityCanvas');
        const ctx = canvas.getContext('2d');
        const dropZone = document.getElementById('dropZone');
        const vacuumToggle = document.getElementById('vacuumToggle');
        const factBox = document.getElementById('factBox');

        // Physics properties for kids simulation
        const objectsData = {
            'apple':   { emoji: '🍎', drag: 0.02, size: 40 },
            'bowling': { emoji: '🎳', drag: 0.005, size: 50 }, // Falls fastest in air
            'leaf':    { emoji: '🍃', drag: 0.15, size: 40 },
            'feather': { emoji: '🪶', drag: 0.25, size: 40 }   // Falls slowest in air
        };

        let isDropping = false;
        let isVacuum = false;
        let animationId;
        
        // Canvas dimensions
        const groundY = 450;
        const startY = 50;

        let obj1 = { x: 150, y: startY, v: 0, type: 'apple' };
        let obj2 = { x: 400, y: startY, v: 0, type: 'feather' };

        function drawScene() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Ground
            ctx.fillStyle = isVacuum ? "#555" : "#2ecc71"; // Gray moon ground or Green grass
            ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);

            // Draw Objects
            ctx.font = `${objectsData[obj1.type].size}px Arial`;
            ctx.fillText(objectsData[obj1.type].emoji, obj1.x - 20, obj1.y);

            ctx.font = `${objectsData[obj2.type].size}px Arial`;
            ctx.fillText(objectsData[obj2.type].emoji, obj2.x - 20, obj2.y);
        }

        function toggleVacuum() {
            isVacuum = vacuumToggle.checked;
            if (isVacuum) {
                dropZone.classList.add('vacuum-bg');
                factBox.className = "alert alert-warning small mb-4";
                if(currentLang === 'ta') {
                    factBox.innerText = "வெற்றிடத்தில் காற்று கிடையாது! எனவே அனைத்துப் பொருட்களும் ஒரே வேகத்தில் விழும் (கலிலியோ விதி).";
                    document.getElementById('envLabel').innerText = "வெற்றிடம் (Vacuum)";
                } else {
                    factBox.innerText = "There is no air in a vacuum! So all objects fall at the exact same speed (Galileo's principle).";
                    document.getElementById('envLabel').innerText = "Vacuum (Space)";
                }
            } else {
                dropZone.classList.remove('vacuum-bg');
                factBox.className = "alert alert-info small mb-4";
                if(currentLang === 'ta') {
                    factBox.innerText = "காற்றில், அதிக எடை மற்றும் குறைவான பரப்பு கொண்ட பொருட்கள் வேகமாக கீழே விழும்.";
                    document.getElementById('envLabel').innerText = "காற்று உள்ள பகுதி (பூமி)";
                } else {
                    factBox.innerText = "In the air, objects with less air resistance fall faster.";
                    document.getElementById('envLabel').innerText = "Air Resistance (Earth)";
                }
            }
            resetDrop();
        }

        function physicsLoop() {
            if (!isDropping) return;

            const gravity = 0.4; // Base gravity acceleration

            // Apply physics to Object 1
            let drag1 = isVacuum ? 0 : objectsData[obj1.type].drag;
            if (obj1.y < groundY) {
                obj1.v += gravity - (drag1 * obj1.v); // Acceleration reduces based on drag
                obj1.y += obj1.v;
            } else {
                obj1.y = groundY;
            }

            // Apply physics to Object 2
            let drag2 = isVacuum ? 0 : objectsData[obj2.type].drag;
            if (obj2.y < groundY) {
                obj2.v += gravity - (drag2 * obj2.v);
                obj2.y += obj2.v;
            } else {
                obj2.y = groundY;
            }

            drawScene();

            // Stop animation if both hit the ground
            if (obj1.y >= groundY && obj2.y >= groundY) {
                isDropping = false;
                cancelAnimationFrame(animationId);
            } else {
                animationId = requestAnimationFrame(physicsLoop);
            }
        }

        function startDrop() {
            if (isDropping) return;
            // Update selected types just in case
            obj1.type = document.getElementById('obj1Select').value;
            obj2.type = document.getElementById('obj2Select').value;
            
            isDropping = true;
            physicsLoop();
        }

        function resetDrop() {
            isDropping = false;
            cancelAnimationFrame(animationId);
            obj1.type = document.getElementById('obj1Select').value;
            obj2.type = document.getElementById('obj2Select').value;
            obj1.y = startY;
            obj2.y = startY;
            obj1.v = 0;
            obj2.v = 0;
            drawScene();
        }

        // Language Toggle Logic
        let currentLang = 'ta';
        function toggleLanguage() {
            currentLang = currentLang === 'ta' ? 'en' : 'ta';
            document.getElementById('langToggleBtn').innerText = currentLang === 'ta' ? 'English' : 'தமிழ்';
            const elements = document.querySelectorAll('[data-ta]');
            elements.forEach(el => { el.innerText = el.getAttribute(`data-${currentLang}`); });
            toggleVacuum(); // Trigger to update dynamic fact box text
        }

        // Initial setup
        drawScene();
    </script>
</body>
</html>
